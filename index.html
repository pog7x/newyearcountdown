<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year Countdown</title>
    <meta name="description" content="Countdown timer to the New Year">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="stylesheet" href="css/styles.css">
  </head>

  <body>
    <header class="header">
      <h1 class="header__title">New Year Countdown!</h1>
    </header>

    <main class="countdown" role="timer" aria-live="polite" aria-label="Countdown to New Year"></main>

    <script src="js/snowstorm-min.js"></script>
    <script>
      snowStorm.snowColor = '#FFFAFA';
      snowStorm.followMouse = false;
      snowStorm.excludeMobile = false;
      snowStorm.snowCharacter = '❄';
      snowStorm.vMaxX = 1;
      snowStorm.vMaxY = 1;
    </script>
    <script src="js/global.js"></script>
  </body>
</html>
